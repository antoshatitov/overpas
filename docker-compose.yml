services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: overpas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      DATABASE_URI: postgresql://postgres:postgres@postgres:5432/overpas
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NODE_ENV: production
    ports:
      - '3000:3000'

volumes:
  postgres-data:
